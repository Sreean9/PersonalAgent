<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no"/>
<title>JioJoin AI Agent</title>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --blue:#0050A0;--blue-lt:#0077CC;--blue-pale:#EFF6FF;--blue-dark:#003880;
  --orange:#E8500A;
  --green:#16A34A;--green-pale:#F0FDF4;
  --yellow:#CA8A04;--yellow-pale:#FEFCE8;
  --red:#DC2626;--red-pale:#FEF2F2;
  --bg:#F0F4F9;--surface:#fff;--surface2:#F7FAFD;
  --border:#DDE4EE;--text:#1A2233;--text2:#4A5568;--text3:#8896A9;
  --radius:16px;--radius-sm:10px;--radius-xs:6px;
  --shadow:0 2px 12px rgba(0,80,160,.10);
  --shadow-md:0 6px 24px rgba(0,80,160,.14);
  --nav-h:64px;--top-h:56px;
}
html,body{height:100%;overflow:hidden;background:var(--bg);font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,sans-serif;color:var(--text)}
 
/* ── Shell ── */
.shell{width:100%;height:100%;background:var(--bg);position:fixed;top:0;left:0;display:flex;flex-direction:column;overflow:hidden}
 
/* ── Status bar ── */
.status-bar{height:40px;background:var(--blue-dark);display:flex;align-items:center;justify-content:space-between;padding:0 18px;flex-shrink:0}
.status-time{color:#fff;font-size:14px;font-weight:600}
.status-icons{color:#fff;font-size:12px;display:flex;gap:6px;align-items:center}
 
/* ── Top bar ── */
.topbar{height:var(--top-h);background:var(--blue);display:flex;align-items:center;padding:0 14px;gap:10px;flex-shrink:0;box-shadow:0 2px 8px rgba(0,0,80,.25);z-index:10}
.topbar-av{width:34px;height:34px;border-radius:50%;background:linear-gradient(135deg,var(--blue-lt),#60A5FA);display:flex;align-items:center;justify-content:center;font-size:17px;flex-shrink:0}
.topbar-info{flex:1;min-width:0}
.topbar-name{color:#fff;font-size:14px;font-weight:700;line-height:1.2}
.topbar-sub{color:rgba(255,255,255,.65);font-size:10px;display:flex;align-items:center;gap:4px;margin-top:1px}
.online-dot{width:6px;height:6px;border-radius:50%;background:#4ADE80;flex-shrink:0}
.icon-btn{width:32px;height:32px;border-radius:50%;background:rgba(255,255,255,.15);border:none;color:#fff;font-size:15px;cursor:pointer;display:flex;align-items:center;justify-content:center}
 
/* ── Key bar ── */
.keybar{background:#FFFBEB;border-bottom:1.5px solid #FDE68A;padding:7px 12px;display:flex;align-items:center;gap:7px;flex-shrink:0}
.keybar label{font-size:11px;font-weight:700;color:#92400E;white-space:nowrap}
.keybar input{flex:1;padding:5px 8px;border:1.5px solid #FCD34D;border-radius:var(--radius-xs);font-size:12px;outline:none;color:var(--text);background:#fff;min-width:0}
.keybar input:focus{border-color:#F59E0B}
.keybar .go-btn{padding:5px 12px;background:#D97706;color:#fff;border:none;border-radius:var(--radius-xs);font-size:12px;font-weight:700;cursor:pointer;white-space:nowrap;-webkit-tap-highlight-color:transparent}
.mode-pill{font-size:10px;font-weight:700;padding:3px 9px;border-radius:20px;white-space:nowrap;flex-shrink:0}
.mode-pill.live{background:#D1FAE5;color:#065F46}
.mode-pill.demo{background:#FEF3C7;color:#92400E}
.mode-pill.testing{background:#DBEAFE;color:#1D4ED8}
 
/* ── Screens ── */
.screen{display:none;flex:1;flex-direction:column;overflow:hidden;min-height:0}
.screen.active{display:flex}
 
/* ── Chat ── */
.messages{flex:1;overflow-y:auto;padding:12px 11px;display:flex;flex-direction:column;gap:10px;-webkit-overflow-scrolling:touch}
.welcome{background:var(--surface);border-radius:var(--radius);padding:18px 14px;text-align:center;box-shadow:var(--shadow)}
.jio-av-big{width:50px;height:50px;border-radius:50%;background:linear-gradient(135deg,var(--blue),var(--blue-lt));display:flex;align-items:center;justify-content:center;font-size:22px;margin:0 auto 10px;box-shadow:0 4px 14px rgba(0,119,204,.3)}
.welcome h3{font-size:14px;font-weight:700;margin-bottom:4px}
.welcome p{font-size:12px;color:var(--text2);line-height:1.5}
.qgrid{display:flex;flex-wrap:wrap;gap:6px;justify-content:center;margin-top:12px}
.qp{padding:6px 10px;background:var(--blue-pale);border:1.5px solid #BFDBFE;border-radius:20px;font-size:11px;color:var(--blue);cursor:pointer;font-weight:500;-webkit-tap-highlight-color:transparent;transition:all .15s}
.qp:active{background:var(--blue);color:#fff}
 
.msg-row{display:flex;gap:7px;align-items:flex-end;max-width:90%}
.msg-row.user{align-self:flex-end;flex-direction:row-reverse}
.msg-row.bot{align-self:flex-start}
.av{width:26px;height:26px;border-radius:50%;flex-shrink:0;display:flex;align-items:center;justify-content:center;font-size:11px;font-weight:700}
.av.b{background:linear-gradient(135deg,var(--blue),var(--blue-lt));color:#fff}
.av.u{background:var(--orange);color:#fff}
.mmeta{display:flex;flex-direction:column;gap:4px}
.bubble{padding:9px 12px;border-radius:18px;font-size:13px;line-height:1.55;word-break:break-word;box-shadow:var(--shadow)}
.bubble.user{background:var(--blue);color:#fff;border-bottom-right-radius:4px}
.bubble.bot{background:var(--surface);color:var(--text);border-bottom-left-radius:4px}
.bubble.bot strong{color:var(--blue-dark)}
.bubble.err-bubble{background:var(--red-pale);border:1px solid #FECACA}
.tools-row{display:flex;flex-wrap:wrap;gap:4px}
.tool-tag{font-size:10px;padding:2px 7px;border-radius:8px;background:var(--green-pale);color:var(--green);font-weight:600;border:1px solid #BBF7D0}
.tool-tag::before{content:'⚡ '}
 
.typing-bub{display:flex;align-items:center;gap:4px;padding:10px 13px;background:var(--surface);border-radius:18px;border-bottom-left-radius:4px;box-shadow:var(--shadow)}
.dot{width:6px;height:6px;border-radius:50%;background:var(--blue-lt);animation:bop 1.2s infinite}
.dot:nth-child(2){animation-delay:.2s}.dot:nth-child(3){animation-delay:.4s}
@keyframes bop{0%,60%,100%{transform:translateY(0);opacity:.4}30%{transform:translateY(-5px);opacity:1}}
 
.input-wrap{padding:8px 11px;background:var(--surface);border-top:1px solid var(--border);flex-shrink:0;padding-bottom:max(8px,env(safe-area-inset-bottom))}
.input-row{display:flex;gap:7px;align-items:flex-end;background:var(--surface2);border:1.5px solid var(--border);border-radius:24px;padding:5px 5px 5px 13px;transition:border-color .2s}
.input-row:focus-within{border-color:var(--blue)}
#inp{flex:1;border:none;background:transparent;font-size:14px;color:var(--text);resize:none;outline:none;max-height:80px;min-height:22px;line-height:1.5;font-family:inherit}
#inp::placeholder{color:var(--text3)}
.send-btn{width:34px;height:34px;border-radius:50%;background:linear-gradient(135deg,var(--blue),var(--blue-lt));border:none;color:#fff;font-size:15px;cursor:pointer;display:flex;align-items:center;justify-content:center;flex-shrink:0;-webkit-tap-highlight-color:transparent;transition:opacity .2s}
.send-btn:disabled{opacity:.4;cursor:not-allowed}
 
/* ── Tasks ── */
.screen-hdr{padding:14px 14px 10px;background:var(--surface);border-bottom:1px solid var(--border);flex-shrink:0}
.screen-title{font-size:17px;font-weight:800;color:var(--text)}
.screen-sub{font-size:12px;color:var(--text3);margin-top:2px}
.list-body{flex:1;overflow-y:auto;padding:11px;-webkit-overflow-scrolling:touch}
.todo-card{background:var(--surface);border-radius:var(--radius);padding:11px 13px;margin-bottom:9px;box-shadow:var(--shadow);border-left:4px solid var(--border);display:flex;align-items:flex-start;gap:11px;cursor:pointer;-webkit-tap-highlight-color:transparent}
.todo-card.high{border-left-color:var(--red)}
.todo-card.medium{border-left-color:var(--yellow)}
.todo-card.low{border-left-color:var(--green)}
.todo-card.done{opacity:.5}
.chk{width:21px;height:21px;border-radius:50%;border:2px solid var(--border);flex-shrink:0;display:flex;align-items:center;justify-content:center;font-size:11px;margin-top:1px;transition:all .2s}
.chk.ticked{background:var(--green);border-color:var(--green);color:#fff}
.todo-body{flex:1;min-width:0}
.todo-title{font-size:13px;font-weight:600;margin-bottom:4px}
.todo-title.done{text-decoration:line-through;color:var(--text3)}
.chips{display:flex;gap:5px;flex-wrap:wrap}
.chip{font-size:10px;padding:2px 7px;border-radius:8px;font-weight:600}
.chip.ph{background:var(--red-pale);color:var(--red)}
.chip.pm{background:var(--yellow-pale);color:var(--yellow)}
.chip.pl{background:var(--green-pale);color:var(--green)}
.chip.st{background:var(--blue-pale);color:var(--blue)}
.chip.due{background:#F5F3FF;color:#7C3AED}
 
/* ── Reminders ── */
.rem-card{background:var(--surface);border-radius:var(--radius);padding:13px;margin-bottom:9px;box-shadow:var(--shadow);display:flex;align-items:center;gap:11px}
.rem-icon{width:40px;height:40px;border-radius:12px;background:linear-gradient(135deg,#FEF3C7,#FDE68A);display:flex;align-items:center;justify-content:center;font-size:19px;flex-shrink:0}
.rem-body{flex:1;min-width:0}
.rem-title{font-size:13px;font-weight:600}
.rem-time{font-size:11px;color:var(--text3);margin-top:2px}
 
/* ── News ── */
.news-card{background:var(--surface);border-radius:var(--radius);padding:13px;margin-bottom:9px;box-shadow:var(--shadow);border-top:3px solid var(--blue-lt)}
.news-cat{font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:.5px;color:var(--blue);margin-bottom:3px}
.news-title{font-size:13px;font-weight:700;margin-bottom:4px}
.news-body{font-size:12px;color:var(--text2);line-height:1.5}
 
.empty{text-align:center;padding:48px 18px;color:var(--text3)}
.empty-icon{font-size:40px;margin-bottom:10px}
.empty-msg{font-size:12px;line-height:1.5}
 
/* ── Bottom nav ── */
.bottom-nav{height:var(--nav-h);background:var(--surface);border-top:1px solid var(--border);display:flex;align-items:stretch;flex-shrink:0;padding-bottom:env(safe-area-inset-bottom);box-shadow:0 -2px 10px rgba(0,0,0,.06)}
.nav-btn{flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:3px;border:none;background:transparent;cursor:pointer;color:var(--text3);font-size:10px;font-weight:600;-webkit-tap-highlight-color:transparent}
.nav-icon{font-size:21px;line-height:1}
.nav-btn.active{color:var(--blue)}
.nav-icon-wrap{position:relative;display:inline-block}
.badge{position:absolute;top:-2px;right:-5px;width:15px;height:15px;border-radius:50%;background:var(--red);color:#fff;font-size:9px;font-weight:700;display:flex;align-items:center;justify-content:center}
 
/* ── Toast ── */
#toasts{position:fixed;bottom:76px;left:50%;transform:translateX(-50%);z-index:9999;display:flex;flex-direction:column;gap:6px;width:88%;pointer-events:none}
.toast{padding:10px 15px;border-radius:10px;font-size:12px;font-weight:600;color:#fff;box-shadow:var(--shadow-md);animation:tin .2s ease;text-align:center}
.toast.ok{background:var(--green)}
.toast.err{background:var(--red)}
.toast.info{background:var(--blue)}
@keyframes tin{from{transform:translateY(8px);opacity:0}to{transform:translateY(0);opacity:1}}
 
/* ── Modal ── */
.modal-bg{position:fixed;inset:0;background:rgba(0,0,0,.5);z-index:1000;display:flex;align-items:center;justify-content:center;padding:20px}
.modal-bg.hidden{display:none}
.modal{background:#fff;border-radius:var(--radius);padding:22px 18px;width:100%;max-width:340px;box-shadow:var(--shadow-md)}
.modal h3{font-size:15px;font-weight:700;margin-bottom:8px}
.modal p{font-size:12px;color:var(--text2);line-height:1.55;margin-bottom:14px}
.modal input{width:100%;padding:9px 11px;border:1.5px solid var(--border);border-radius:var(--radius-xs);font-size:13px;outline:none;margin-bottom:12px;color:var(--text)}
.modal input:focus{border-color:var(--blue)}
.modal-btns{display:flex;gap:8px}
.modal-btns button{flex:1;padding:10px;border-radius:var(--radius-xs);font-size:13px;font-weight:700;cursor:pointer;border:none}
.btn-cancel{background:var(--bg);color:var(--text2)}
.btn-apply{background:var(--blue);color:#fff}
 
::-webkit-scrollbar{width:3px}
::-webkit-scrollbar-thumb{background:var(--border);border-radius:8px}
</style>
</head>
<body>
<div class="shell">
 
  <!-- Status bar -->
  <div class="status-bar">
    <span class="status-time" id="clock">9:41</span>
    <div class="status-icons"><span>●●●</span><span>WiFi</span><span>🔋</span></div>
  </div>
 
  <!-- Top bar -->
  <div class="topbar">
    <div class="topbar-av">🤖</div>
    <div class="topbar-info">
      <div class="topbar-name">Jio AI Assistant</div>
      <div class="topbar-sub">
        <span class="online-dot"></span>
        <span id="mode-label">Live AI · Llama 3.3-70b</span>
      </div>
    </div>
    <button class="icon-btn" onclick="newChat()" title="New chat">✏️</button>
  </div>
 
  <!-- Mode pill bar -->
  <div class="keybar">
    <span class="mode-pill live" id="mode-pill">Live AI</span>
    <span style="flex:1;font-size:11px;color:var(--text2)" id="key-hint">🟢 Powered by Llama 3.3-70b · Groq</span>
  </div>
 
  <!-- ── CHAT ── -->
  <div class="screen active" id="screen-chat">
    <div class="messages" id="msgs"></div>
    <div class="input-wrap">
      <div class="input-row">
        <textarea id="inp" rows="1" placeholder="Ask Jio anything…"
          onkeydown="onKey(event)" oninput="autoResize(this)"></textarea>
        <button class="send-btn" id="send-btn" onclick="send()">➤</button>
      </div>
    </div>
  </div>
 
  <!-- ── TASKS ── -->
  <div class="screen" id="screen-tasks">
    <div class="screen-hdr">
      <div class="screen-title">My Tasks</div>
      <div class="screen-sub" id="tasks-sub">No pending tasks</div>
    </div>
    <div class="list-body" id="todo-list"></div>
  </div>
 
  <!-- ── REMINDERS ── -->
  <div class="screen" id="screen-reminders">
    <div class="screen-hdr">
      <div class="screen-title">Reminders</div>
      <div class="screen-sub" id="rem-sub">No active reminders</div>
    </div>
    <div class="list-body" id="rem-list"></div>
  </div>
 
  <!-- ── WHAT'S NEW ── -->
  <div class="screen" id="screen-news">
    <div class="screen-hdr">
      <div class="screen-title">What's New</div>
      <div class="screen-sub">Latest JioJoin updates &amp; features</div>
    </div>
    <div class="list-body" id="news-list"></div>
  </div>
 
  <!-- Bottom nav -->
  <div class="bottom-nav">
    <button class="nav-btn active" id="nav-chat" onclick="showScreen('chat')">
      <div class="nav-icon-wrap"><span class="nav-icon">💬</span></div><span>Chat</span>
    </button>
    <button class="nav-btn" id="nav-tasks" onclick="showScreen('tasks')">
      <div class="nav-icon-wrap"><span class="nav-icon">✅</span><span class="badge" id="task-badge" style="display:none">0</span></div><span>Tasks</span>
    </button>
    <button class="nav-btn" id="nav-reminders" onclick="showScreen('reminders')">
      <div class="nav-icon-wrap"><span class="nav-icon">🔔</span><span class="badge" id="rem-badge" style="display:none">0</span></div><span>Reminders</span>
    </button>
    <button class="nav-btn" id="nav-news" onclick="showScreen('news')">
      <div class="nav-icon-wrap"><span class="nav-icon">🆕</span></div><span>What's New</span>
    </button>
  </div>
 
</div><!-- .shell -->
 
 
<div id="toasts"></div>
 
<script>
// ═══════════════════════════════════════════════════════
//  STATE
// ═══════════════════════════════════════════════════════
let todos = [], reminders = [], interests = [], todoId = 1, remId = 1;
let groqKey = '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', chatHistory = [], busy = false;
 
const GROQ_MODEL    = 'llama-3.3-70b-versatile';
const GROQ_URL      = 'https://api.groq.com/openai/v1/chat/completions';
const FETCH_TIMEOUT = 20000; // 20 seconds
 
const SYSTEM_PROMPT = `You are Jio, a friendly personal AI assistant built into the JioJoin mobile app by Reliance Jio.
 
You help users with:
1. To-Do list — add, view, complete, delete tasks
2. Reminders — set and list reminders
3. Calculations and unit conversions
4. What's new in JioJoin — features and announcements
5. Exploring interests — cricket, cooking, finance, fitness, etc.
6. ANY general question — answer from your training knowledge
 
IMPORTANT: Do NOT use brave_search or any web search tool. You do not have internet access. For real-time questions (weather, live scores, stock prices), clearly say you don't have live data and give the best answer you can from training knowledge.
 
Rules:
- Keep responses short and mobile-friendly
- Respond in the same language the user uses (English or Hindi)
- Be warm, conversational, and helpful
- Use the provided tools for tasks/reminders/interests only
आप हिंदी में भी उतनी ही कुशलता से जवाब दे सकते हैं।`;
 
const GROQ_TOOLS = [
  {type:'function',function:{name:'add_todo',description:'Create a new task.',parameters:{type:'object',properties:{title:{type:'string'},priority:{type:'string',enum:['low','medium','high']},due_date:{type:'string'}},required:['title']}}},
  {type:'function',function:{name:'list_todos',description:'List tasks.',parameters:{type:'object',properties:{status:{type:'string',enum:['pending','in_progress','completed']}},required:[]}}},
  {type:'function',function:{name:'update_todo',description:'Update task status.',parameters:{type:'object',properties:{todo_id:{type:'string'},status:{type:'string',enum:['pending','in_progress','completed']}},required:['todo_id','status']}}},
  {type:'function',function:{name:'delete_todo',description:'Delete a task.',parameters:{type:'object',properties:{todo_id:{type:'string'}},required:['todo_id']}}},
  {type:'function',function:{name:'set_reminder',description:'Set a reminder.',parameters:{type:'object',properties:{title:{type:'string'},remind_at:{type:'string'}},required:['title','remind_at']}}},
  {type:'function',function:{name:'list_reminders',description:'List reminders.',parameters:{type:'object',properties:{},required:[]}}},
  {type:'function',function:{name:'get_whats_new',description:'Show JioJoin announcements.',parameters:{type:'object',properties:{},required:[]}}},
  {type:'function',function:{name:'update_user_interests',description:'Save user interests.',parameters:{type:'object',properties:{topics:{type:'array',items:{type:'string'}}},required:['topics']}}},
  {type:'function',function:{name:'explore_interest',description:'Get content about a topic.',parameters:{type:'object',properties:{topic:{type:'string'}},required:['topic']}}},
  {type:'function',function:{name:'brave_search',description:'Search the web for real-time information.',parameters:{type:'object',properties:{query:{type:'string',description:'Search query'}},required:['query']}}},
];
 
const NEWS_DATA = [
  {cat:'Feature',title:'Welcome to JioJoin AI! 🎉',body:'Your personal assistant is here. Manage tasks, set reminders, calculate anything, and discover new interests — all in one chat.'},
  {cat:'Feature',title:'Hindi Support is Live!',body:'आप अब हिंदी में बात कर सकते हैं! The agent responds in the language you write in.'},
  {cat:'Feature',title:'Smart To-Do Tracking',body:'Set priorities (high/medium/low), due dates, and tags. Just describe your task naturally and Jio handles the rest.'},
  {cat:'Tip',title:'Explore Your Interests',body:"Tell Jio what you're curious about — cricket, cooking, finance, fitness — and get personalised content every day."},
  {cat:'Coming Soon',title:'JioJoin Premium',body:'Advanced scheduling, team task sharing, and priority AI support. Coming soon for JioJoin Premium users.'},
];
 
// ═══════════════════════════════════════════════════════
//  INIT
// ═══════════════════════════════════════════════════════
window.onload = () => {
  updateClock();
  setInterval(updateClock, 30000);
  renderNews();
  renderTodos();
  renderReminders();
  renderWelcome();
};
 
function updateClock() {
  const n = new Date();
  document.getElementById('clock').textContent =
    n.toLocaleTimeString('en-US',{hour:'numeric',minute:'2-digit',hour12:true}).replace(' ','');
}
 
// ═══════════════════════════════════════════════════════
//  NAV
// ═══════════════════════════════════════════════════════
function showScreen(name) {
  document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
  document.querySelectorAll('.nav-btn').forEach(b => b.classList.remove('active'));
  document.getElementById('screen-' + name).classList.add('active');
  document.getElementById('nav-' + name).classList.add('active');
}
 
// ═══════════════════════════════════════════════════════
//  API KEY MODAL
// ═══════════════════════════════════════════════════════
function openKeyModal() {
  document.getElementById('key-modal').classList.remove('hidden');
  document.getElementById('key-status').textContent = '';
  document.getElementById('key-input').value = groqKey || '';
  setTimeout(() => document.getElementById('key-input').focus(), 100);
}
 
function closeKeyModal() {
  document.getElementById('key-modal').classList.add('hidden');
}
 
async function applyKey() {
  const key = document.getElementById('key-input').value.trim();
  if (!key) { setKeyStatus('⚠️ Please paste your Groq API key first.', 'red'); return; }
 
  const btn = document.getElementById('apply-btn');
  btn.disabled = true;
  btn.textContent = 'Testing…';
  setKeyStatus('🔄 Connecting to Groq API…', '#1D4ED8');
  document.getElementById('mode-pill').className = 'mode-pill testing';
  document.getElementById('mode-pill').textContent = 'Testing…';
 
  try {
    const res = await fetchWithTimeout(GROQ_URL, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json', 'Authorization': 'Bearer ' + key },
      body: JSON.stringify({
        model: GROQ_MODEL,
        messages: [{ role: 'user', content: 'Say "OK" in one word.' }],
        max_tokens: 5,
        temperature: 0,
      })
    }, 15000);
 
    if (!res.ok) {
      const err = await res.json().catch(() => ({}));
      const msg = err?.error?.message || res.statusText;
      if (res.status === 401) {
        setKeyStatus('❌ Invalid key — Groq rejected it. Check you copied the full key.', 'red');
      } else if (res.status === 429) {
        setKeyStatus('⚠️ Rate limit — but key is valid! Activating anyway.', 'orange');
        activateLiveMode(key);
      } else {
        setKeyStatus('❌ Error ' + res.status + ': ' + msg, 'red');
      }
      btn.disabled = false; btn.textContent = 'Test & Activate';
      if (res.status !== 429) {
        document.getElementById('mode-pill').className = 'mode-pill demo';
        document.getElementById('mode-pill').textContent = 'Demo';
      }
      return;
    }
 
    activateLiveMode(key);
    setKeyStatus('', '');
    closeKeyModal();
    toast('✅ Live AI activated!', 'ok');
    addBubble('bot', '🟢 **Live AI mode is ON!** I\'m now powered by Llama 3.3-70b (Groq). Ask me anything — tasks, reminders, calculations, or any general question!', []);
 
  } catch (e) {
    const isTimeout = e.message === 'TIMEOUT';
    setKeyStatus(isTimeout
      ? '❌ Request timed out. Check your internet connection and try again.'
      : '❌ Could not reach Groq. Check your internet and try again. (' + e.message + ')', 'red');
    document.getElementById('mode-pill').className = 'mode-pill demo';
    document.getElementById('mode-pill').textContent = 'Demo';
  }
 
  btn.disabled = false;
  btn.textContent = 'Test & Activate';
}

// ═══════════════════════════════════════════════════════
//  FETCH WITH TIMEOUT
// ═══════════════════════════════════════════════════════
function fetchWithTimeout(url, options, ms) {
  return new Promise((resolve, reject) => {
    const timer = setTimeout(() => reject(new Error('TIMEOUT')), ms);
    fetch(url, options)
      .then(res => { clearTimeout(timer); resolve(res); })
      .catch(err => { clearTimeout(timer); reject(err); });
  });
}

// ═══════════════════════════════════════════════════════
//  LIVE GROQ MODE
// ═══════════════════════════════════════════════════════
async function callGroqLive(userMsg) {
  chatHistory.push({ role: 'user', content: userMsg });
  const messages = [{ role: 'system', content: SYSTEM_PROMPT }, ...chatHistory];
  const toolsUsed = [];
 
  for (let round = 0; round < 5; round++) {
    const res = await fetchWithTimeout(GROQ_URL, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json', 'Authorization': 'Bearer ' + groqKey },
      body: JSON.stringify({ model: GROQ_MODEL, messages, tools: GROQ_TOOLS, tool_choice: 'auto', temperature: 0.7, max_tokens: 1024 })
    }, FETCH_TIMEOUT);
 
    if (!res.ok) {
      const err = await res.json().catch(() => ({}));
      throw new Error((err?.error?.message || res.statusText || String(res.status)));
    }
 
    const data = await res.json();
    const msg = data.choices[0].message;
 
    if (!msg.tool_calls || msg.tool_calls.length === 0) {
      const reply = msg.content || '';
      chatHistory.push({ role: 'assistant', content: reply });
      return { reply, tools: toolsUsed };
    }
 
    messages.push({ role: 'assistant', content: msg.content || '', tool_calls: msg.tool_calls });
    for (const tc of msg.tool_calls) {
      const name = tc.function.name;
      let args = {};
      try { args = JSON.parse(tc.function.arguments); } catch {}
      toolsUsed.push(name);
      const result = await dispatchTool(name, args);
      messages.push({ role: 'tool', tool_call_id: tc.id, name, content: JSON.stringify(result) });
    }
  }
  return { reply: 'Reached max rounds. Please try again.', tools: toolsUsed };
}
 
// ═══════════════════════════════════════════════════════
//  TOOL DISPATCHER
// ═══════════════════════════════════════════════════════
async function dispatchTool(name, args) {
  switch (name) {
    case 'add_todo': {
      const id = todoId++;
      const priority = args.priority || 'medium';
      const due = args.due_date ? toNiceDate(args.due_date) : null;
      todos.push({ id, title: args.title, priority, status: 'pending', due });
      renderTodos(); showScreen('tasks'); toast('Task added! ✅', 'ok');
      return { success: true, todo: { id, title: args.title, priority, status: 'pending', due_date: due } };
    }
    case 'list_todos': {
      const f = args.status ? todos.filter(t => t.status === args.status) : todos;
      return { todos: f.map(t => ({ id: t.id, title: t.title, priority: t.priority, status: t.status, due_date: t.due })) };
    }
    case 'update_todo': {
      const t = todos.find(x => String(x.id) === String(args.todo_id));
      if (!t) return { success: false, error: 'Task not found' };
      if (args.status) t.status = args.status;
      renderTodos(); toast(args.status === 'completed' ? 'Task done! 🎉' : 'Updated', 'ok');
      return { success: true, todo: { id: t.id, title: t.title, status: t.status } };
    }
    case 'delete_todo': {
      const idx = todos.findIndex(x => String(x.id) === String(args.todo_id));
      if (idx === -1) return { success: false, error: 'Task not found' };
      const [removed] = todos.splice(idx, 1);
      renderTodos();
      return { success: true, message: `Deleted "${removed.title}"` };
    }
    case 'set_reminder': {
      const id = remId++;
      reminders.push({ id, title: args.title, time: args.remind_at || 'Soon' });
      renderReminders(); showScreen('reminders'); toast('Reminder set! 🔔', 'ok');
      return { success: true, reminder: { id, title: args.title, remind_at: args.remind_at } };
    }
    case 'list_reminders':
      return { reminders: reminders.map(r => ({ id: r.id, title: r.title, remind_at: r.time })) };
    case 'get_whats_new':
      showScreen('news');
      return { announcements: NEWS_DATA };
    case 'update_user_interests':
      interests = [...new Set([...interests, ...(args.topics || [])])];
      return { success: true, interests };
    case 'explore_interest':
      return { topic: args.topic, interests, content: `Tell the user something interesting and engaging about "${args.topic}".` };
    case 'brave_search':
      // We don't have real internet access — tell the model to answer from training knowledge
      return { error: 'Web search is not available in this environment. Please answer the question using your training knowledge and clearly mention that the data may not be real-time.' };
    default:
      return { error: 'Unknown tool: ' + name };
  }
}
 
// ═══════════════════════════════════════════════════════
//  DEMO MODE (rule-based, no key needed)
// ═══════════════════════════════════════════════════════
function agentRespond(msg) {
  const m = msg.toLowerCase().trim();
  const hi = /[ऀ-ॿ]/.test(msg);
 
  if ((/\b(add|create|make|नया|जोड़)\b/.test(m) && /\b(task|todo|काम)\b/.test(m)) || /^(add task:|create task:)/i.test(msg))
    return handleAddTodo(msg, hi);
 
  if ((/\b(show|list|see|view|दिखाओ)\b/.test(m) && /\b(task|todo|काम)\b/.test(m)) || m === 'मेरे सभी काम दिखाओ')
    return handleListTodos(hi);
 
  if (/\b(complete|done|finish|mark|पूरा)\b/.test(m) && /\b(task|todo|काम)\b/.test(m))
    return handleCompleteTodo(msg, hi);
 
  if (/\b(delete|remove|हटाओ)\b/.test(m) && /\b(task|todo|काम)\b/.test(m))
    return handleDeleteTodo(msg, hi);
 
  if (/\b(remind|reminder|याद दिलाओ)\b/.test(m))
    return handleSetReminder(msg, hi);
 
  if (/what'?s new|new feature|new in jiojoin|announcement|नया क्या|अपडेट|\bnews\b/.test(m))
    return handleWhatsNew(hi);
 
  if ((/\bwhat is\b/.test(m) && /[\d%+\-*/]/.test(m)) ||
      /\b(calculat|compute|percent|sqrt|power|गणना|कितना)\b/.test(m) ||
      /\d+\s*[+\-*/^%]\s*\d+/.test(m) || /\d+%\s*of\s*\d+/i.test(m))
    return handleCalculate(msg, hi);
 
  if (/\bconvert\b/.test(m) || (/\d/.test(m) && /\b(miles|km|kilogram|pound|celsius|fahrenheit|litre|liter|gallon|kg|lbs|feet|foot|meter|mb|gb|tb)\b/.test(m)))
    return handleConvert(msg, hi);
 
  if (/\b(interest|love|like|enjoy|hobby|cricket|cooking|fitness|finance|music|travel|gaming|पसंद|शौक)\b/.test(m))
    return handleInterests(msg, hi);
 
  if (/\b(tell me about|explore|learn about|facts|tips|latest on|what about|happening)\b/.test(m))
    return handleExplore(msg, hi);
 
  if (/^(hi|hello|hey|namaste|नमस्ते|हैलो|good morning|good evening|हाय)\b/.test(m))
    return handleGreeting(hi);
 
  if (/\b(help|what can you|capabilities|मदद)\b/.test(m))
    return handleHelp(hi);
 
  return handleFallback(hi);
}
 
function handleAddTodo(msg, hi) {
  let title = msg.replace(/^(add|create|make|please|add task:|create task:|जोड़ो|नया काम)/gi, '')
                 .replace(/\b(task|todo|काम)\b/gi, '').trim();
  let priority = 'medium';
  if (/\b(high|urgent|important|जरूरी)\b/i.test(msg)) priority = 'high';
  if (/\b(low|later)\b/i.test(msg)) priority = 'low';
  let due = null;
  const dm = msg.match(/by\s+([\w\s]+?)(?:,|$|\.)/i) || msg.match(/(monday|tuesday|wednesday|thursday|friday|saturday|sunday|today|tomorrow)/i);
  if (dm) due = toNiceDate((dm[1] || dm[0]).trim());
  title = title.replace(/[:,]\s*(high|medium|low|urgent)\s*(priority)?/gi, '').replace(/by\s+\w+/gi, '').trim();
  if (!title || title.length < 2) title = 'New task';
  title = cap(title);
  const id = todoId++;
  todos.push({ id, title, priority, status: 'pending', due });
  renderTodos(); showScreen('tasks'); toast('Task added! ✅', 'ok');
  if (hi) return { reply: `ठीक है! काम जोड़ा:\n\n**"${title}"**\nप्राथमिकता: ${priority}${due ? `\nतारीख: ${due}` : ''}`, tools: ['add_todo'] };
  return { reply: `Done! Added **"${title}"** — ${priority} priority${due ? `, due ${due}` : ''}. ✅\n\nCheck the Tasks tab!`, tools: ['add_todo'] };
}
 
function handleListTodos(hi) {
  if (!todos.length) return { reply: hi ? 'अभी कोई काम नहीं है।' : 'No tasks yet! Say **"Add task: Buy groceries"** to get started.', tools: ['list_todos'] };
  const pending = todos.filter(t => t.status !== 'completed');
  const done = todos.filter(t => t.status === 'completed');
  let lines = '';
  if (pending.length) lines += `**Pending (${pending.length}):**\n` + pending.map((t, i) => `${i+1}. ${t.title} · _${t.priority}_${t.due ? ' · ' + t.due : ''}`).join('\n');
  if (done.length) lines += `\n\n**Done (${done.length}):**\n` + done.map(t => `✓ ${t.title}`).join('\n');
  if (hi) return { reply: `आपके काम:\n\n${pending.map((t,i) => `${i+1}. ${t.title} (${t.priority})`).join('\n')}`, tools: ['list_todos'] };
  return { reply: `Here are your tasks:\n\n${lines}`, tools: ['list_todos'] };
}
 
function handleCompleteTodo(msg, hi) {
  const pending = todos.filter(t => t.status !== 'completed');
  if (!pending.length) return { reply: hi ? 'सभी काम पूरे! 🎉' : 'All tasks already done! 🎉', tools: ['update_todo'] };
  const words = msg.toLowerCase().replace(/\b(mark|complete|done|finish|task|as|the)\b/g, '').trim().split(/\s+/).filter(w => w.length > 2);
  let matched = pending.find(t => words.some(w => t.title.toLowerCase().includes(w))) || pending[pending.length - 1];
  matched.status = 'completed'; renderTodos(); toast('Task done! 🎉', 'ok');
  if (hi) return { reply: `"${matched.title}" पूरा! 🎉`, tools: ['update_todo'] };
  return { reply: `**"${matched.title}"** marked complete. ✅ Great work!`, tools: ['update_todo'] };
}
 
function handleDeleteTodo(msg, hi) {
  if (!todos.length) return { reply: 'No tasks to delete.', tools: ['delete_todo'] };
  const last = todos[todos.length - 1];
  todos = todos.filter(t => t.id !== last.id); renderTodos();
  if (hi) return { reply: `"${last.title}" हटा दिया।`, tools: ['delete_todo'] };
  return { reply: `**"${last.title}"** deleted.`, tools: ['delete_todo'] };
}
 
function handleSetReminder(msg, hi) {
  let title = msg.replace(/remind(er)?\s*(me\s*)?(to)?/gi, '').replace(/set\s+a?\s*reminder(\s+to)?/gi, '').trim();
  let time = 'Tomorrow at 9:00 AM';
  const tm = msg.match(/(?:at|@)\s*([\d:apmAMP\s]+)/i);
  const dm = msg.match(/(today|tomorrow|monday|tuesday|wednesday|thursday|friday|saturday|sunday)/i);
  if (tm && dm) time = `${cap(dm[1])} at ${tm[1].trim()}`;
  else if (dm) time = `${cap(dm[1])} at 9:00 AM`;
  else if (tm) time = `Today at ${tm[1].trim()}`;
  const hm = msg.match(/in\s+(\d+)\s+hour/i);
  const mm = msg.match(/in\s+(\d+)\s+min/i);
  if (hm) time = `In ${hm[1]} hour${hm[1]>1?'s':''}`;
  if (mm) time = `In ${mm[1]} minutes`;
  title = title.replace(/(?:at|@)\s*[\d:apmAMP\s]+/gi, '').replace(/(today|tomorrow|monday|tuesday|wednesday|thursday|friday)/gi, '').replace(/in\s+\d+\s+\w+/gi, '').trim();
  if (!title || title.length < 2) title = 'Reminder';
  title = cap(title);
  reminders.push({ id: remId++, title, time }); renderReminders(); showScreen('reminders'); toast('Reminder set! 🔔', 'ok');
  if (hi) return { reply: `🔔 **"${title}"**\n🕐 ${time}\n\nयाद दिलाने के लिए सेट!`, tools: ['set_reminder'] };
  return { reply: `🔔 Reminder set!\n\n**"${title}"**\n🕐 **${time}**`, tools: ['set_reminder'] };
}
 
function handleCalculate(msg, hi) {
  let result = null, expression = '', formatted = '';
  const pct = msg.match(/([\d.]+)\s*%\s*of\s*([\d,]+)/i);
  if (pct) { const p = parseFloat(pct[1]), b = parseFloat(pct[2].replace(',','')); result = (p/100)*b; expression = `${p}% of ${b}`; formatted = result % 1 === 0 ? result.toLocaleString('en-IN') : result.toFixed(2); }
  if (result === null) {
    const s = msg.replace(/[^0-9+\-*/().%^\s]/g,'').trim();
    if (s) { try { const safe = s.replace(/\^/g,'**'); result = Function('"use strict";return (' + safe + ')')(); expression = s; formatted = typeof result==='number' ? (result%1===0 ? result.toLocaleString('en-IN') : result.toFixed(6).replace(/0+$/,'')) : String(result); } catch {} }
  }
  if (result === null || isNaN(result)) return { reply: hi ? 'यह हिसाब नहीं हो पाया।' : "Couldn't compute that. Try **\"18% of 4500\"** or **\"145 * 7\"**.", tools: ['calculate'] };
  if (!formatted) formatted = result % 1 === 0 ? result.toLocaleString('en-IN') : result.toFixed(6).replace(/0+$/,'');
  return { reply: `**${expression || 'Result'}** = **${formatted}**`, tools: ['calculate'] };
}
 
function handleConvert(msg, hi) {
  const pairs = [
    {from:/\bkm\b/i,to:/\bmile/i,factor:0.621371,fu:'km',tu:'miles'},
    {from:/\bmile/i,to:/\bkm\b/i,factor:1.60934,fu:'miles',tu:'km'},
    {from:/\bkg\b/i,to:/\blb/i,factor:2.20462,fu:'kg',tu:'lbs'},
    {from:/\blb/i,to:/\bkg\b/i,factor:0.453592,fu:'lbs',tu:'kg'},
    {from:/\b(metre|meter)\b/i,to:/\b(feet|foot)\b/i,factor:3.28084,fu:'metres',tu:'feet'},
    {from:/\b(feet|foot)\b/i,to:/\b(metre|meter)\b/i,factor:0.3048,fu:'feet',tu:'metres'},
    {from:/\b(litre|liter)\b/i,to:/\bgallon\b/i,factor:0.264172,fu:'litres',tu:'gallons'},
    {from:/\bgb\b/i,to:/\bmb\b/i,factor:1024,fu:'GB',tu:'MB'},
    {from:/\bmb\b/i,to:/\bgb\b/i,factor:1/1024,fu:'MB',tu:'GB'},
  ];
  const cToF = msg.match(/([\d.]+)\s*(?:°?c|celsius)/i);
  const fToC = msg.match(/([\d.]+)\s*(?:°?f|fahrenheit)/i);
  if (cToF) { const c = parseFloat(cToF[1]), f = c*9/5+32; return { reply: `**${c}°C = ${f.toFixed(1)}°F**`, tools: ['convert_units'] }; }
  if (fToC) { const f = parseFloat(fToC[1]), c = (f-32)*5/9; return { reply: `**${f}°F = ${c.toFixed(1)}°C**`, tools: ['convert_units'] }; }
  const nm = msg.match(/([\d,]+\.?\d*)/);
  const val = nm ? parseFloat(nm[1].replace(',','')) : 1;
  for (const p of pairs) { if (p.from.test(msg) && p.to.test(msg)) { const r = val*p.factor; return { reply: `**${val} ${p.fu} = ${r%1===0?r.toFixed(0):r.toFixed(4).replace(/0+$/,'')} ${p.tu}**`, tools: ['convert_units'] }; } }
  for (const p of pairs) { if (p.from.test(msg)) { const r = val*p.factor; return { reply: `**${val} ${p.fu} = ${r%1===0?r.toFixed(0):r.toFixed(4).replace(/0+$/,'')} ${p.tu}**`, tools: ['convert_units'] }; } }
  return { reply: 'I can convert: km/miles, kg/lbs, metres/feet, litres/gallons, GB/MB, °C/°F.\n\nTry: **"100 km to miles"**', tools: ['convert_units'] };
}

function toNiceDate(str) {
  if (!str) return null;
  const s = str.trim().toLowerCase();
  const d = new Date();
  if (s === 'today') return d.toLocaleDateString('en-IN', { day:'numeric', month:'short' });
  if (s === 'tomorrow') { d.setDate(d.getDate()+1); return d.toLocaleDateString('en-IN', { day:'numeric', month:'short' }); }
  const days = { monday:1, tuesday:2, wednesday:3, thursday:4, friday:5, saturday:6, sunday:0 };
  if (days[s] !== undefined) { let diff = days[s]-d.getDay(); if (diff<=0) diff+=7; d.setDate(d.getDate()+diff); return d.toLocaleDateString('en-IN', { weekday:'short', day:'numeric', month:'short' }); }
  return str.trim();
}
function cap(s) { return s ? s.charAt(0).toUpperCase() + s.slice(1) : s; }
function esc(s) { return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;'); }
function sleep(ms) { return new Promise(r => setTimeout(r, ms)); }
function toast(msg, type='info') {
  const tc = document.getElementById('toasts');
  const t = document.createElement('div');
  t.className = 'toast ' + type; t.textContent = msg;
  tc.appendChild(t); setTimeout(() => t.remove(), 3000);
}
