<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no"/>
<title>JioJoin AI Agent</title>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --blue:#0050A0;--blue-lt:#0077CC;--blue-pale:#EFF6FF;--blue-dark:#003880;
  --orange:#E8500A;
  --green:#16A34A;--green-pale:#F0FDF4;
  --yellow:#CA8A04;--yellow-pale:#FEFCE8;
  --red:#DC2626;--red-pale:#FEF2F2;
  --bg:#F0F4F9;--surface:#fff;--surface2:#F7FAFD;
  --border:#DDE4EE;--text:#1A2233;--text2:#4A5568;--text3:#8896A9;
  --radius:16px;--radius-sm:10px;--radius-xs:6px;
  --shadow:0 2px 12px rgba(0,80,160,.10);
  --shadow-md:0 6px 24px rgba(0,80,160,.14);
  --nav-h:64px;--top-h:56px;
}
html,body{height:100%;overflow:hidden;background:var(--bg);font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,sans-serif;color:var(--text)}
 
/* ── Shell ── */
.shell{width:100%;height:100%;background:var(--bg);position:fixed;top:0;left:0;display:flex;flex-direction:column;overflow:hidden}
.hidden{display:none!important}
 
/* ── Auth Screen ── */
.auth-screen{
  position:fixed;inset:0;background:linear-gradient(160deg,var(--blue-dark) 0%,var(--blue) 60%,var(--blue-lt) 100%);
  display:flex;align-items:center;justify-content:center;padding:24px;z-index:100;
}
.auth-card{
  background:#fff;border-radius:24px;padding:32px 24px;width:100%;max-width:360px;
  box-shadow:0 20px 60px rgba(0,0,0,.3);
}
.auth-logo{width:60px;height:60px;border-radius:50%;background:linear-gradient(135deg,var(--blue),var(--blue-lt));display:flex;align-items:center;justify-content:center;font-size:28px;margin:0 auto 14px;}
.auth-title{text-align:center;font-size:20px;font-weight:800;color:var(--text);margin-bottom:4px}
.auth-sub{text-align:center;font-size:12px;color:var(--text3);margin-bottom:24px}
.auth-tabs{display:flex;background:var(--bg);border-radius:10px;padding:3px;margin-bottom:20px;gap:3px}
.auth-tab{flex:1;padding:8px;text-align:center;font-size:13px;font-weight:600;border-radius:8px;cursor:pointer;color:var(--text3);border:none;background:transparent;transition:all .2s}
.auth-tab.active{background:#fff;color:var(--blue);box-shadow:var(--shadow)}
.auth-field{margin-bottom:14px}
.auth-field label{display:block;font-size:11px;font-weight:700;color:var(--text2);margin-bottom:5px;text-transform:uppercase;letter-spacing:.4px}
.auth-field input{width:100%;padding:11px 14px;border:1.5px solid var(--border);border-radius:var(--radius-xs);font-size:14px;outline:none;color:var(--text);background:var(--bg);transition:border-color .2s}
.auth-field input:focus{border-color:var(--blue);background:#fff}
.auth-btn{width:100%;padding:13px;background:linear-gradient(135deg,var(--blue),var(--blue-lt));color:#fff;border:none;border-radius:var(--radius-xs);font-size:15px;font-weight:700;cursor:pointer;margin-top:4px;transition:opacity .2s}
.auth-btn:disabled{opacity:.6;cursor:not-allowed}
.auth-err{background:var(--red-pale);color:var(--red);font-size:12px;padding:9px 12px;border-radius:var(--radius-xs);margin-top:12px;display:none;text-align:center;font-weight:500}
.auth-err.show{display:block}
.backend-note{font-size:10px;color:var(--text3);text-align:center;margin-top:16px;line-height:1.5}
 
/* ── Status bar ── */
.status-bar{height:40px;background:var(--blue-dark);display:flex;align-items:center;justify-content:space-between;padding:0 18px;flex-shrink:0}
.status-time{color:#fff;font-size:14px;font-weight:600}
.status-icons{color:#fff;font-size:12px;display:flex;gap:6px;align-items:center}
 
/* ── Top bar ── */
.topbar{height:var(--top-h);background:var(--blue);display:flex;align-items:center;padding:0 14px;gap:10px;flex-shrink:0;box-shadow:0 2px 8px rgba(0,0,80,.25);z-index:10}
.topbar-av{width:34px;height:34px;border-radius:50%;background:linear-gradient(135deg,var(--blue-lt),#60A5FA);display:flex;align-items:center;justify-content:center;font-size:17px;flex-shrink:0}
.topbar-info{flex:1;min-width:0}
.topbar-name{color:#fff;font-size:14px;font-weight:700;line-height:1.2}
.topbar-sub{color:rgba(255,255,255,.65);font-size:10px;display:flex;align-items:center;gap:4px;margin-top:1px}
.online-dot{width:6px;height:6px;border-radius:50%;background:#4ADE80;flex-shrink:0}
.icon-btn{width:32px;height:32px;border-radius:50%;background:rgba(255,255,255,.15);border:none;color:#fff;font-size:15px;cursor:pointer;display:flex;align-items:center;justify-content:center;-webkit-tap-highlight-color:transparent}
 
/* ── Mode bar ── */
.modebar{background:var(--green-pale);border-bottom:1px solid #BBF7D0;padding:6px 14px;display:flex;align-items:center;gap:8px;flex-shrink:0}
.mode-pill{font-size:10px;font-weight:700;padding:3px 9px;border-radius:20px;background:#D1FAE5;color:#065F46}
.modebar-txt{font-size:11px;color:var(--green);font-weight:500}
.user-chip{margin-left:auto;font-size:11px;font-weight:600;color:var(--text2);background:var(--surface);padding:3px 10px;border-radius:20px;border:1px solid var(--border)}
 
/* ── Screens ── */
.screen{display:none;flex:1;flex-direction:column;overflow:hidden;min-height:0}
.screen.active{display:flex}
 
/* ── Chat ── */
.messages{flex:1;overflow-y:auto;padding:12px 11px;display:flex;flex-direction:column;gap:10px;-webkit-overflow-scrolling:touch}
.welcome{background:var(--surface);border-radius:var(--radius);padding:18px 14px;text-align:center;box-shadow:var(--shadow)}
.jio-av-big{width:50px;height:50px;border-radius:50%;background:linear-gradient(135deg,var(--blue),var(--blue-lt));display:flex;align-items:center;justify-content:center;font-size:22px;margin:0 auto 10px;box-shadow:0 4px 14px rgba(0,119,204,.3)}
.welcome h3{font-size:14px;font-weight:700;margin-bottom:4px}
.welcome p{font-size:12px;color:var(--text2);line-height:1.5}
.qgrid{display:flex;flex-wrap:wrap;gap:6px;justify-content:center;margin-top:12px}
.qp{padding:6px 10px;background:var(--blue-pale);border:1.5px solid #BFDBFE;border-radius:20px;font-size:11px;color:var(--blue);cursor:pointer;font-weight:500;-webkit-tap-highlight-color:transparent}
.qp:active{background:var(--blue);color:#fff}
 
.msg-row{display:flex;gap:7px;align-items:flex-end;max-width:90%}
.msg-row.user{align-self:flex-end;flex-direction:row-reverse}
.msg-row.bot{align-self:flex-start}
.av{width:26px;height:26px;border-radius:50%;flex-shrink:0;display:flex;align-items:center;justify-content:center;font-size:11px;font-weight:700}
.av.b{background:linear-gradient(135deg,var(--blue),var(--blue-lt));color:#fff}
.av.u{background:var(--orange);color:#fff}
.mmeta{display:flex;flex-direction:column;gap:4px}
.bubble{padding:9px 12px;border-radius:18px;font-size:13px;line-height:1.55;word-break:break-word;box-shadow:var(--shadow)}
.bubble.user{background:var(--blue);color:#fff;border-bottom-right-radius:4px}
.bubble.bot{background:var(--surface);color:var(--text);border-bottom-left-radius:4px}
.bubble.bot strong{color:var(--blue-dark)}
.tools-row{display:flex;flex-wrap:wrap;gap:4px}
.tool-tag{font-size:10px;padding:2px 7px;border-radius:8px;background:var(--green-pale);color:var(--green);font-weight:600;border:1px solid #BBF7D0}
.tool-tag::before{content:'⚡ '}
 
.typing-bub{display:flex;align-items:center;gap:4px;padding:10px 13px;background:var(--surface);border-radius:18px;border-bottom-left-radius:4px;box-shadow:var(--shadow)}
.dot{width:6px;height:6px;border-radius:50%;background:var(--blue-lt);animation:bop 1.2s infinite}
.dot:nth-child(2){animation-delay:.2s}.dot:nth-child(3){animation-delay:.4s}
@keyframes bop{0%,60%,100%{transform:translateY(0);opacity:.4}30%{transform:translateY(-5px);opacity:1}}
 
.input-wrap{padding:8px 11px;background:var(--surface);border-top:1px solid var(--border);flex-shrink:0;padding-bottom:max(8px,env(safe-area-inset-bottom))}
.input-row{display:flex;gap:7px;align-items:flex-end;background:var(--surface2);border:1.5px solid var(--border);border-radius:24px;padding:5px 5px 5px 13px;transition:border-color .2s}
.input-row:focus-within{border-color:var(--blue)}
#inp{flex:1;border:none;background:transparent;font-size:14px;color:var(--text);resize:none;outline:none;max-height:80px;min-height:22px;line-height:1.5;font-family:inherit}
#inp::placeholder{color:var(--text3)}
.send-btn{width:34px;height:34px;border-radius:50%;background:linear-gradient(135deg,var(--blue),var(--blue-lt));border:none;color:#fff;font-size:15px;cursor:pointer;display:flex;align-items:center;justify-content:center;flex-shrink:0;-webkit-tap-highlight-color:transparent;transition:opacity .2s}
.send-btn:disabled{opacity:.4;cursor:not-allowed}
 
/* ── Tasks / Reminders ── */
.screen-hdr{padding:14px 14px 10px;background:var(--surface);border-bottom:1px solid var(--border);flex-shrink:0;display:flex;align-items:center;justify-content:space-between}
.screen-hdr-left .screen-title{font-size:17px;font-weight:800;color:var(--text)}
.screen-hdr-left .screen-sub{font-size:12px;color:var(--text3);margin-top:2px}
.refresh-btn{padding:6px 12px;background:var(--blue-pale);color:var(--blue);border:1px solid #BFDBFE;border-radius:20px;font-size:11px;font-weight:700;cursor:pointer}
.list-body{flex:1;overflow-y:auto;padding:11px;-webkit-overflow-scrolling:touch}
.todo-card{background:var(--surface);border-radius:var(--radius);padding:11px 13px;margin-bottom:9px;box-shadow:var(--shadow);border-left:4px solid var(--border);display:flex;align-items:flex-start;gap:11px;cursor:pointer;-webkit-tap-highlight-color:transparent}
.todo-card.high{border-left-color:var(--red)}
.todo-card.medium{border-left-color:var(--yellow)}
.todo-card.low{border-left-color:var(--green)}
.todo-card.done{opacity:.5}
.chk{width:21px;height:21px;border-radius:50%;border:2px solid var(--border);flex-shrink:0;display:flex;align-items:center;justify-content:center;font-size:11px;margin-top:1px;transition:all .2s}
.chk.ticked{background:var(--green);border-color:var(--green);color:#fff}
.todo-body{flex:1;min-width:0}
.todo-title{font-size:13px;font-weight:600;margin-bottom:4px}
.todo-title.done{text-decoration:line-through;color:var(--text3)}
.chips{display:flex;gap:5px;flex-wrap:wrap}
.chip{font-size:10px;padding:2px 7px;border-radius:8px;font-weight:600}
.chip.ph{background:var(--red-pale);color:var(--red)}
.chip.pm{background:var(--yellow-pale);color:var(--yellow)}
.chip.pl{background:var(--green-pale);color:var(--green)}
.chip.st{background:var(--blue-pale);color:var(--blue)}
.chip.due{background:#F5F3FF;color:#7C3AED}
.rem-card{background:var(--surface);border-radius:var(--radius);padding:13px;margin-bottom:9px;box-shadow:var(--shadow);display:flex;align-items:center;gap:11px}
.rem-icon{width:40px;height:40px;border-radius:12px;background:linear-gradient(135deg,#FEF3C7,#FDE68A);display:flex;align-items:center;justify-content:center;font-size:19px;flex-shrink:0}
.rem-body{flex:1;min-width:0}
.rem-title{font-size:13px;font-weight:600}
.rem-time{font-size:11px;color:var(--text3);margin-top:2px}
.news-card{background:var(--surface);border-radius:var(--radius);padding:13px;margin-bottom:9px;box-shadow:var(--shadow);border-top:3px solid var(--blue-lt)}
.news-cat{font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:.5px;color:var(--blue);margin-bottom:3px}
.news-title{font-size:13px;font-weight:700;margin-bottom:4px}
.news-body{font-size:12px;color:var(--text2);line-height:1.5}
.empty{text-align:center;padding:48px 18px;color:var(--text3)}
.empty-icon{font-size:40px;margin-bottom:10px}
.empty-msg{font-size:12px;line-height:1.5}
 
/* ── Bottom nav ── */
.bottom-nav{height:var(--nav-h);background:var(--surface);border-top:1px solid var(--border);display:flex;align-items:stretch;flex-shrink:0;padding-bottom:env(safe-area-inset-bottom);box-shadow:0 -2px 10px rgba(0,0,0,.06)}
.nav-btn{flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:3px;border:none;background:transparent;cursor:pointer;color:var(--text3);font-size:10px;font-weight:600;-webkit-tap-highlight-color:transparent}
.nav-icon{font-size:21px;line-height:1}
.nav-btn.active{color:var(--blue)}
.nav-icon-wrap{position:relative;display:inline-block}
.badge{position:absolute;top:-2px;right:-5px;width:15px;height:15px;border-radius:50%;background:var(--red);color:#fff;font-size:9px;font-weight:700;display:flex;align-items:center;justify-content:center}
 
/* ── Toast ── */
#toasts{position:fixed;bottom:76px;left:50%;transform:translateX(-50%);z-index:9999;display:flex;flex-direction:column;gap:6px;width:88%;pointer-events:none}
.toast{padding:10px 15px;border-radius:10px;font-size:12px;font-weight:600;color:#fff;box-shadow:var(--shadow-md);animation:tin .2s ease;text-align:center}
.toast.ok{background:var(--green)}.toast.err{background:var(--red)}.toast.info{background:var(--blue)}
@keyframes tin{from{transform:translateY(8px);opacity:0}to{transform:translateY(0);opacity:1}}
 
/* ── Loading spinner ── */
.spinner-screen{position:fixed;inset:0;background:var(--blue-dark);display:flex;flex-direction:column;align-items:center;justify-content:center;z-index:200;gap:16px}
.spinner{width:44px;height:44px;border:4px solid rgba(255,255,255,.2);border-top-color:#fff;border-radius:50%;animation:spin .8s linear infinite}
@keyframes spin{to{transform:rotate(360deg)}}
.spinner-txt{color:rgba(255,255,255,.8);font-size:14px;font-weight:500}
::-webkit-scrollbar{width:3px}
::-webkit-scrollbar-thumb{background:var(--border);border-radius:8px}
</style>
</head>
<body>
 
<!-- Loading spinner -->
<div class="spinner-screen" id="spinner">
  <div class="spinner"></div>
  <div class="spinner-txt">Starting JioJoin AI…</div>
</div>
 
<!-- Auth screen -->
<div class="auth-screen hidden" id="auth-screen">
  <div class="auth-card">
    <div class="auth-logo">🤖</div>
    <div class="auth-title">JioJoin AI</div>
    <div class="auth-sub">Your personal AI assistant</div>
    <div class="auth-tabs">
      <button class="auth-tab active" id="tab-login" onclick="switchTab('login')">Sign In</button>
      <button class="auth-tab" id="tab-register" onclick="switchTab('register')">Register</button>
    </div>
    <div class="auth-field">
      <label>Username</label>
      <input type="text" id="auth-user" placeholder="Enter username" autocomplete="username" autocorrect="off" autocapitalize="off"/>
    </div>
    <div class="auth-field" id="email-field" style="display:none">
      <label>Email</label>
      <input type="email" id="auth-email" placeholder="Enter email"/>
    </div>
    <div class="auth-field">
      <label>Password</label>
      <input type="password" id="auth-pass" placeholder="Enter password" autocomplete="current-password"/>
    </div>
    <button class="auth-btn" id="auth-btn" onclick="submitAuth()">Sign In</button>
    <div class="auth-err" id="auth-err"></div>
    <div class="backend-note">Connected to JioJoin AI Backend</div>
  </div>
</div>
 
<!-- Main app -->
<div class="shell hidden" id="main-app">
  <div class="status-bar">
    <span class="status-time" id="clock">9:41</span>
    <div class="status-icons"><span>●●●</span><span>WiFi</span><span>🔋</span></div>
  </div>
  <div class="topbar">
    <div class="topbar-av">🤖</div>
    <div class="topbar-info">
      <div class="topbar-name">Jio AI Assistant</div>
      <div class="topbar-sub"><span class="online-dot"></span><span>Live · Llama 3.3-70b</span></div>
    </div>
    <button class="icon-btn" onclick="newChat()" title="New chat">✏️</button>
    <button class="icon-btn" onclick="logout()" title="Sign out" style="margin-left:4px">🚪</button>
  </div>
  <div class="modebar">
    <span class="mode-pill">Production</span>
    <span class="modebar-txt">Live AI · Real database</span>
    <span class="user-chip" id="user-chip">User</span>
  </div>
 
  <!-- Chat -->
  <div class="screen active" id="screen-chat">
    <div class="messages" id="msgs"></div>
    <div class="input-wrap">
      <div class="input-row">
        <textarea id="inp" rows="1" placeholder="Ask Jio anything…" onkeydown="onKey(event)" oninput="autoResize(this)"></textarea>
        <button class="send-btn" id="send-btn" onclick="send()">➤</button>
      </div>
    </div>
  </div>
 
  <!-- Tasks -->
  <div class="screen" id="screen-tasks">
    <div class="screen-hdr">
      <div class="screen-hdr-left">
        <div class="screen-title">My Tasks</div>
        <div class="screen-sub" id="tasks-sub">Loading…</div>
      </div>
      <button class="refresh-btn" onclick="loadTodos()">↻ Refresh</button>
    </div>
    <div class="list-body" id="todo-list"></div>
  </div>
 
  <!-- Reminders -->
  <div class="screen" id="screen-reminders">
    <div class="screen-hdr">
      <div class="screen-hdr-left">
        <div class="screen-title">Reminders</div>
        <div class="screen-sub" id="rem-sub">Loading…</div>
      </div>
      <button class="refresh-btn" onclick="loadReminders()">↻ Refresh</button>
    </div>
    <div class="list-body" id="rem-list"></div>
  </div>
 
  <!-- What's New -->
  <div class="screen" id="screen-news">
    <div class="screen-hdr">
      <div class="screen-hdr-left">
        <div class="screen-title">What's New</div>
        <div class="screen-sub">Latest JioJoin updates</div>
      </div>
      <button class="refresh-btn" onclick="loadNews()">↻ Refresh</button>
    </div>
    <div class="list-body" id="news-list"></div>
  </div>
 
  <!-- Bottom nav -->
  <div class="bottom-nav">
    <button class="nav-btn active" id="nav-chat" onclick="showScreen('chat')">
      <div class="nav-icon-wrap"><span class="nav-icon">💬</span></div><span>Chat</span>
    </button>
    <button class="nav-btn" id="nav-tasks" onclick="showScreen('tasks')">
      <div class="nav-icon-wrap"><span class="nav-icon">✅</span><span class="badge" id="task-badge" style="display:none">0</span></div><span>Tasks</span>
    </button>
    <button class="nav-btn" id="nav-reminders" onclick="showScreen('reminders')">
      <div class="nav-icon-wrap"><span class="nav-icon">🔔</span><span class="badge" id="rem-badge" style="display:none">0</span></div><span>Reminders</span>
    </button>
    <button class="nav-btn" id="nav-news" onclick="showScreen('news')">
      <div class="nav-icon-wrap"><span class="nav-icon">🆕</span></div><span>What's New</span>
    </button>
  </div>
</div>
 
<div id="toasts"></div>
 
<script>
// ═══════════════════════════════════════════════════════════════
//  CONFIG — Update BACKEND_URL after Railway deployment
// ═══════════════════════════════════════════════════════════════
const BACKEND_URL = 'https://YOUR-APP.railway.app'; // ← UPDATE THIS after Railway deploy
 
// ═══════════════════════════════════════════════════════════════
//  STATE
// ═══════════════════════════════════════════════════════════════
let jwtToken   = null;
let sessionId  = null;
let username   = null;
let authMode   = 'login'; // 'login' | 'register'
let busy       = false;
 
// ═══════════════════════════════════════════════════════════════
//  INIT
// ═══════════════════════════════════════════════════════════════
window.onload = async () => {
  updateClock();
  setInterval(updateClock, 30000);
 
  // Check backend is reachable
  try {
    const res = await fetch(BACKEND_URL + '/health', { signal: AbortSignal.timeout(8000) });
    if (res.ok) {
      hide('spinner'); show('auth-screen');
    } else {
      showSpinnerErr('Backend returned error ' + res.status);
    }
  } catch (e) {
    showSpinnerErr('Cannot reach backend.\n\nUpdate BACKEND_URL in index.html\nwith your Railway URL.');
  }
};
 
function showSpinnerErr(msg) {
  document.querySelector('.spinner-txt').innerHTML =
    '⚠️ ' + msg.replace(/\n/g,'<br/>');
  document.querySelector('.spinner').style.display = 'none';
}
 
function updateClock() {
  const n = new Date();
  document.getElementById('clock').textContent =
    n.toLocaleTimeString('en-US',{hour:'numeric',minute:'2-digit',hour12:true}).replace(' ','');
}
 
function show(id){ document.getElementById(id).classList.remove('hidden'); }
function hide(id){ document.getElementById(id).classList.add('hidden'); }
 
// ═══════════════════════════════════════════════════════════════
//  AUTH
// ═══════════════════════════════════════════════════════════════
function switchTab(mode) {
  authMode = mode;
  document.getElementById('tab-login').classList.toggle('active', mode === 'login');
  document.getElementById('tab-register').classList.toggle('active', mode === 'register');
  document.getElementById('auth-btn').textContent = mode === 'login' ? 'Sign In' : 'Create Account';
  document.getElementById('email-field').style.display = mode === 'register' ? 'block' : 'none';
  document.getElementById('auth-err').classList.remove('show');
}
 
async function submitAuth() {
  const user = document.getElementById('auth-user').value.trim();
  const pass = document.getElementById('auth-pass').value.trim();
  const email = document.getElementById('auth-email').value.trim();
  const errEl = document.getElementById('auth-err');
  const btn = document.getElementById('auth-btn');
 
  if (!user || !pass) { showAuthErr('Please enter username and password.'); return; }
  if (authMode === 'register' && !email) { showAuthErr('Please enter your email.'); return; }
 
  btn.disabled = true;
  btn.textContent = authMode === 'login' ? 'Signing in…' : 'Creating account…';
  errEl.classList.remove('show');
 
  try {
    let token;
    if (authMode === 'register') {
      const res = await apiCall('/auth/register', 'POST', { username: user, email, password: pass });
      if (!res.ok) { const d = await res.json(); throw new Error(d.detail || 'Registration failed'); }
      // Auto-login after register
      const lr = await apiCall('/auth/login', 'POST', { username: user, password: pass });
      if (!lr.ok) { const d = await lr.json(); throw new Error(d.detail || 'Login failed'); }
      const ld = await lr.json();
      token = ld.access_token;
    } else {
      const res = await apiCall('/auth/login', 'POST', { username: user, password: pass });
      if (!res.ok) { const d = await res.json(); throw new Error(d.detail || 'Invalid credentials'); }
      const d = await res.json();
      token = d.access_token;
    }
 
    jwtToken = token;
    username = user;
    document.getElementById('user-chip').textContent = '👤 ' + user;
    hide('auth-screen'); show('main-app');
    renderWelcome();
    await Promise.all([loadTodos(), loadReminders(), loadNews()]);
 
  } catch (e) {
    showAuthErr(e.message);
  }
 
  btn.disabled = false;
  btn.textContent = authMode === 'login' ? 'Sign In' : 'Create Account';
}
 
function showAuthErr(msg) {
  const el = document.getElementById('auth-err');
  el.textContent = msg; el.classList.add('show');
}
 
function logout() {
  jwtToken = null; sessionId = null; username = null;
  hide('main-app');
  document.getElementById('auth-user').value = '';
  document.getElementById('auth-pass').value = '';
  document.getElementById('auth-err').classList.remove('show');
  show('auth-screen');
  toast('Signed out', 'info');
}
 
// ═══════════════════════════════════════════════════════════════
//  API HELPERS
// ═══════════════════════════════════════════════════════════════
function apiCall(path, method = 'GET', body = null) {
  const opts = {
    method,
    headers: { 'Content-Type': 'application/json' },
    signal: AbortSignal.timeout(25000),
  };
  if (jwtToken) opts.headers['Authorization'] = 'Bearer ' + jwtToken;
  if (body) opts.body = JSON.stringify(body);
  return fetch(BACKEND_URL + path, opts);
}
 
// ═══════════════════════════════════════════════════════════════
//  NAV
// ═══════════════════════════════════════════════════════════════
function showScreen(name) {
  document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
  document.querySelectorAll('.nav-btn').forEach(b => b.classList.remove('active'));
  document.getElementById('screen-' + name).classList.add('active');
  document.getElementById('nav-' + name).classList.add('active');
  if (name === 'tasks') loadTodos();
  if (name === 'reminders') loadReminders();
  if (name === 'news') loadNews();
}
 
// ═══════════════════════════════════════════════════════════════
//  DATA LOADERS
// ═══════════════════════════════════════════════════════════════
async function loadTodos() {
  try {
    const res = await apiCall('/todos');
    if (!res.ok) return;
    const todos = await res.json();
    renderTodos(todos);
  } catch { /* silent */ }
}
 
async function loadReminders() {
  try {
    const res = await apiCall('/reminders');
    if (!res.ok) return;
    const data = await res.json();
    renderReminders(data);
  } catch { /* silent */ }
}
 
async function loadNews() {
  try {
    const res = await apiCall('/whats-new');
    if (!res.ok) return;
    const data = await res.json();
    renderNews(data);
  } catch { /* silent */ }
}
 
// ═══════════════════════════════════════════════════════════════
//  RENDER PANELS
// ═══════════════════════════════════════════════════════════════
function renderTodos(todos = []) {
  const el = document.getElementById('todo-list');
  const pending = todos.filter(t => t.status !== 'completed').length;
  document.getElementById('tasks-sub').textContent =
    todos.length ? `${pending} pending · ${todos.length - pending} completed` : 'No tasks yet';
  const badge = document.getElementById('task-badge');
  if (pending > 0) { badge.style.display = 'flex'; badge.textContent = pending; }
  else badge.style.display = 'none';
  if (!todos.length) { el.innerHTML = '<div class="empty"><div class="empty-icon">📋</div><div class="empty-msg">No tasks yet.<br/>Ask Jio to add one in Chat!</div></div>'; return; }
  el.innerHTML = todos.slice().reverse().map(t => `
    <div class="todo-card ${t.priority||'medium'} ${t.status==='completed'?'done':''}">
      <div class="chk ${t.status==='completed'?'ticked':''}">${t.status==='completed'?'✓':''}</div>
      <div class="todo-body">
        <div class="todo-title ${t.status==='completed'?'done':''}">${esc(t.title)}</div>
        <div class="chips">
          <span class="chip p${(t.priority||'m')[0]}">${t.priority||'medium'}</span>
          <span class="chip st">${(t.status||'pending').replace('_',' ')}</span>
          ${t.due_date ? `<span class="chip due">📅 ${esc(t.due_date)}</span>` : ''}
        </div>
      </div>
    </div>`).join('');
}
 
function renderReminders(data = []) {
  const reminders = Array.isArray(data) ? data : (data.reminders || []);
  const el = document.getElementById('rem-list');
  document.getElementById('rem-sub').textContent = reminders.length ? `${reminders.length} active reminder${reminders.length>1?'s':''}` : 'No active reminders';
  const badge = document.getElementById('rem-badge');
  if (reminders.length > 0) { badge.style.display='flex'; badge.textContent=reminders.length; }
  else badge.style.display='none';
  if (!reminders.length) { el.innerHTML='<div class="empty"><div class="empty-icon">🔔</div><div class="empty-msg">No reminders yet.<br/>Ask Jio to set one!</div></div>'; return; }
  el.innerHTML = reminders.map(r => `
    <div class="rem-card">
      <div class="rem-icon">🔔</div>
      <div class="rem-body">
        <div class="rem-title">${esc(r.title)}</div>
        <div class="rem-time">${esc(r.remind_at||'')}</div>
      </div>
    </div>`).join('');
}
 
function renderNews(data = []) {
  const items = Array.isArray(data) ? data : (data.announcements || []);
  const el = document.getElementById('news-list');
  if (!items.length) { el.innerHTML='<div class="empty"><div class="empty-icon">🆕</div><div class="empty-msg">No announcements yet.</div></div>'; return; }
  el.innerHTML = items.map(n => `
    <div class="news-card">
      <div class="news-cat">${esc(n.category||'Update')}</div>
      <div class="news-title">${esc(n.title||'')}</div>
      <div class="news-body">${esc(n.body||n.content||'')}</div>
    </div>`).join('');
}
 
// ═══════════════════════════════════════════════════════════════
//  CHAT UI
// ═══════════════════════════════════════════════════════════════
function renderWelcome() {
  document.getElementById('msgs').innerHTML = `
    <div class="welcome">
      <div class="jio-av-big">🤖</div>
      <h3>Namaste! I'm Jio 👋</h3>
      <p>Your personal AI assistant — powered by Llama 3.3-70b.<br/>
         All your data is saved securely in the cloud.<br/>
         <strong>आप हिंदी में भी बात कर सकते हैं!</strong></p>
      <div class="qgrid">
        <span class="qp" onclick="qsend(this)">Add task: Review Q2 report by Friday</span>
        <span class="qp" onclick="qsend(this)">What is 18% of 4500?</span>
        <span class="qp" onclick="qsend(this)">Remind me to call doctor tomorrow 9am</span>
        <span class="qp" onclick="qsend(this)">What's new in JioJoin?</span>
        <span class="qp" onclick="qsend(this)">Convert 100 km to miles</span>
        <span class="qp" onclick="qsend(this)">I love cricket and personal finance</span>
        <span class="qp" onclick="qsend(this)">मेरे सभी काम दिखाओ</span>
      </div>
    </div>`;
}
 
function newChat() {
  sessionId = null;
  renderWelcome();
  showScreen('chat');
  toast('New session started', 'info');
}
 
function onKey(e) { if (e.key==='Enter'&&!e.shiftKey){e.preventDefault();send();} }
function autoResize(el){ el.style.height='auto'; el.style.height=Math.min(el.scrollHeight,80)+'px'; }
function qsend(el){ sendText(el.textContent.trim()); }
 
function send() {
  const el = document.getElementById('inp');
  const txt = el.value.trim();
  if (!txt || busy) return;
  el.value=''; el.style.height='auto';
  sendText(txt);
}
 
async function sendText(txt) {
  if (busy) return;
  showScreen('chat');
  addBubble('user', txt);
  showTyping(); busy=true;
  document.getElementById('send-btn').disabled=true;
 
  try {
    const res = await apiCall('/chat', 'POST', { message: txt, session_id: sessionId });
    if (!res.ok) {
      if (res.status===401) { logout(); toast('Session expired. Please sign in again.','err'); return; }
      const err = await res.json().catch(()=>({}));
      throw new Error(err.detail || 'Error ' + res.status);
    }
    const data = await res.json();
    sessionId = data.session_id;
    hideTyping();
    addBubble('bot', data.reply, data.tools_used || []);
    // Refresh todos/reminders after chat (agent may have updated them)
    await Promise.all([loadTodos(), loadReminders()]);
  } catch(e) {
    hideTyping();
    addBubble('bot', '⚠️ **Error:** ' + e.message + '\n\nPlease check your connection and try again.', []);
  }
 
  busy=false;
  document.getElementById('send-btn').disabled=false;
}
 
let typingEl=null;
function showTyping(){
  const msgs=document.getElementById('msgs');
  typingEl=document.createElement('div');
  typingEl.className='msg-row bot';
  typingEl.innerHTML='<div class="av b">🤖</div><div class="mmeta"><div class="typing-bub"><div class="dot"></div><div class="dot"></div><div class="dot"></div></div></div>';
  msgs.appendChild(typingEl); msgs.scrollTop=msgs.scrollHeight;
}
function hideTyping(){ if(typingEl){typingEl.remove();typingEl=null;} }
 
function addBubble(role, text, tools=[]) {
  const msgs=document.getElementById('msgs');
  const row=document.createElement('div'); row.className='msg-row '+role;
  const av=document.createElement('div'); av.className='av '+(role==='user'?'u':'b');
  av.textContent=role==='user'?(username?username[0].toUpperCase():'U'):'🤖';
  const meta=document.createElement('div'); meta.className='mmeta';
  const bubble=document.createElement('div'); bubble.className='bubble '+role;
  bubble.innerHTML=fmt(text); meta.appendChild(bubble);
  if(role==='bot'&&tools.length){
    const tr=document.createElement('div'); tr.className='tools-row';
    tools.forEach(t=>{const s=document.createElement('span');s.className='tool-tag';s.textContent=t.replace(/_/g,' ');tr.appendChild(s);});
    meta.appendChild(tr);
  }
  row.appendChild(av); row.appendChild(meta); msgs.appendChild(row);
  msgs.scrollTop=msgs.scrollHeight;
}
 
function fmt(t){
  return t.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;')
    .replace(/\*\*(.*?)\*\*/g,'<strong>$1</strong>')
    .replace(/__(.*?)__/g,'<em>$1</em>')
    .replace(/\n/g,'<br/>');
}
 
// ═══════════════════════════════════════════════════════════════
//  UTILS
// ═══════════════════════════════════════════════════════════════
function esc(s){ return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;'); }
function toast(msg, type='info'){
  const tc=document.getElementById('toasts');
  const t=document.createElement('div');
  t.className='toast '+type; t.textContent=msg;
  tc.appendChild(t); setTimeout(()=>t.remove(),3000);
}
</script>
